<script>
// Unique session ID for the visitor
const userId = "user_" + Math.random().toString(36).substring(2, 9);
let pageViews = 1;
let startTime = Date.now();
let actionCount = 0;

// Function to securely send data to your Google Sheet instantly
function sendAnalytics(isClosing = false) {
    actionCount++;
    const timeSpent = Math.round((Date.now() - startTime) / 1000);
    
    const roleInput = document.getElementById('role-input')?.value || "";
    const taskInput = document.getElementById('task-input')?.value || "";
    const constraintsInput = document.getElementById('constraints-input')?.value || "";
    const generatedPrompt = document.getElementById('output-box')?.innerText || document.getElementById('output-box')?.value || "";
    
    const payload = {
        userId: userId,
        pageViews: pageViews,
        timeOnPage: timeSpent,
        actions: `Generations: ${actionCount}`,
        device: navigator.userAgentData?.mobile ? "Mobile" : "Desktop",
        userInputs: `Role: ${roleInput} | Task: ${taskInput} | Constraints: ${constraintsInput}`,
        generatedPrompt: generatedPrompt,
        referrer: document.referrer || "Direct Link",
        screenSize: `${window.screen.width}x${window.screen.height}`,
        language: navigator.language || "Unknown",
        promptWordCount: generatedPrompt ? generatedPrompt.split(/\s+/).filter(Boolean).length : 0
    };

    // Use fetch for instant delivery while they are on the page
    fetch("https://script.google.com/macros/s/AKfycbwDnXK7o_3gGcBblpwjQwVRKhsMGD0lMiq-jUoghuM9RaN9Nr8CB25SnnUEB-1Rhr-C/exec", {
        method: "POST",
        mode: "no-cors",
        cache: "no-cache",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    }).catch(err => console.log("Analytics backup log:", err));
}

// Hook into your existing Generate button
document.addEventListener("DOMContentLoaded", () => {
    // Looks for your generate button (make sure your button ID matches 'generate-btn')
    const generateBtn = document.getElementById('generate-btn') || document.querySelector('button');
    if (generateBtn) {
        generateBtn.addEventListener('click', () => {
            // Give the app a split second to generate the text first, then send it to Google
            setTimeout(sendAnalytics, 500);
        });
    }
});

// Keep backup for when they close the tab
window.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        const timeSpent = Math.round((Date.now() - startTime) / 1000);
        if (timeSpent > 5) { // Only log exit if they stayed longer than 5 seconds
            sendAnalytics(true);
        }
    }
});
</script>
